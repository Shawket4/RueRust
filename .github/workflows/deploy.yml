name: Build and Deploy RueRust

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-target-release-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          strip target/x86_64-unknown-linux-gnu/release/rue-rust
          chmod +x target/x86_64-unknown-linux-gnu/release/rue-rust

      - name: Package deployment
        run: |
          mkdir -p deployment
          cp target/x86_64-unknown-linux-gnu/release/rue-rust deployment/
          tar -czf deployment.tar.gz -C deployment .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload to VPS
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT }} \
            deployment.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/rue-rust-deployment.tar.gz

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            DEPLOY_DIR="/opt/rue-rust"
            SERVICE="rue-rust"
            BACKUP_DIR="/opt/rue-rust/backups"

            sudo mkdir -p $DEPLOY_DIR $BACKUP_DIR

            # Backup existing binary
            if [ -f $DEPLOY_DIR/rue-rust ]; then
              TS=$(date +%Y%m%d_%H%M%S)
              sudo cp $DEPLOY_DIR/rue-rust $BACKUP_DIR/rue-rust.$TS
              sudo ls -t $BACKUP_DIR/rue-rust.* | tail -n +6 | xargs -r sudo rm
            fi

            # Stop service
            sudo systemctl stop $SERVICE || true

            # Extract new binary
            sudo tar -xzf /tmp/rue-rust-deployment.tar.gz -C $DEPLOY_DIR
            sudo chmod +x $DEPLOY_DIR/rue-rust
            sudo chown -R root:root $DEPLOY_DIR

            # Start service
            sudo systemctl daemon-reload
            sudo systemctl start $SERVICE
            sudo systemctl status $SERVICE --no-pager

            # Cleanup
            rm /tmp/rue-rust-deployment.tar.gz
            echo "✅ Deployment complete"
          EOF
